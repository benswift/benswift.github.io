name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Publish to AT Protocol
        run: pnpm run atproto:publish
        env:
          ATP_IDENTIFIER: ${{ secrets.ATP_IDENTIFIER }}
          ATP_APP_PASSWORD: ${{ secrets.ATP_APP_PASSWORD }}
          # Announce newly-published posts to Bluesky. The back catalogue is
          # seeded in atproto-syndication.json, so only new posts are sent.
          BLUESKY_CROSSPOST: "1"

      - name: Build with Astro
        run: pnpm run build

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          # Default excludes all dotfiles (--exclude=.[^/]*), which drops the
          # .well-known/ directory from the artifact and 404s the Standard.site
          # publication verification. Keep hidden files.
          include-hidden-files: true

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add atproto-state.json atproto-syndication.json public/.well-known/site.standard.publication
          git diff --staged --quiet || (git commit -m "[skip ci] update atproto state" && git push)

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
