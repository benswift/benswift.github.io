allowBuilds:
  esbuild: true
  sharp: false

# Name patterns (not name@version): the supply-chain verify gate matches the
# minimumReleaseAge exclude list by package name glob, so versioned entries are
# silently ignored. These are first-party/closely-tracked deps we deliberately
# adopt on release day.
minimumReleaseAgeExclude:
  - astro
  - "@astrojs/internal-helpers"
  - "@astrojs/markdown-remark"
  - "@astrojs/markdown-satteri"
  - "@astrojs/mdx"
  - "@astrojs/svelte"
  - p5

overrides:
  "yaml@<2.8.3": ">=2.8.3"
  # dependabot security pins --- remove each once parent deps move past the vulnerable range
  "undici@>=7.0.0 <7.28.0": "7.28.0"
  "tar@>=7.0.0 <7.5.16": "7.5.16"
  "vite@>=7.0.0 <7.3.5": "7.3.5"
  "js-yaml@>=4.0.0 <4.2.0": "4.2.0"
  "esbuild@>=0.27.3 <0.28.1": "0.28.1"
