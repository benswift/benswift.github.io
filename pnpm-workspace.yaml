allowBuilds:
  esbuild: true
  sharp: false

# Name patterns (not name@version): the supply-chain verify gate matches the
# minimumReleaseAge exclude list by package name glob, so versioned entries are
# silently ignored. These are first-party/closely-tracked deps we deliberately
# adopt on release day.
minimumReleaseAgeExclude:
  - astro
  - "@astrojs/internal-helpers"
  - "@astrojs/markdown-remark"
  - "@astrojs/markdown-satteri"
  - "@astrojs/mdx"
  - "@astrojs/svelte"
  - p5

# Dependabot security pins. Always use a floating ">=X" replacement, never an
# exact version: an exact pin freezes the dep at that version forever, so the
# next advisory lands on a dep the pin itself is holding back. Remove each entry
# once parent deps move past the vulnerable range.
overrides:
  "yaml@<2.8.3": ">=2.8.3"
  "brace-expansion@>=3.0.0 <5.0.7": ">=5.0.7"
