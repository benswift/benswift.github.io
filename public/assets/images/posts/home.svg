<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2844 1600">
  <defs>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#be2edd" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#be2edd" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="screenFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="0.3" stop-color="#1a1a1a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#1a1a1a" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="projectorLight" cx="0.48" cy="0.35" r="0.55">
      <stop offset="0" stop-color="#be2edd" stop-opacity="0.22"/>
      <stop offset="0.4" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="0.48" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#9b1fb8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cableGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0e0e0" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e0e0e0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="audienceGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#be2edd" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect fill="#1a1a1a" width="2844" height="1600"/>
  <!-- ambient light cast from screen -->
  <rect fill="url(#projectorLight)" width="2844" height="1600"/>
  <!-- projection screen — glowing rectangle, upper centre -->
  <g transform="rotate(-1 1380 460)">
    <rect x="820" y="120" width="1120" height="680" rx="6" fill="url(#screenFace)" stroke="url(#screenGlow)" stroke-width="4" opacity="0.95"/>
    <!-- screen inner glow -->
    <rect x="840" y="140" width="1080" height="640" rx="4" fill="#1a1a1a" opacity="0.6"/>
    <!-- screen edge bloom -->
    <rect x="820" y="120" width="1120" height="680" rx="6" fill="url(#screenGlow)" opacity="0.06"/>
  </g>
  <!-- code lines on screen — abstract coloured strokes suggesting livecode -->
  <g transform="rotate(-1 1380 460)" opacity="0.75">
    <!-- line cluster 1: purple (define / callback) -->
    <path d="M 900 210 C 940 208, 1020 212, 1100 210" stroke="#be2edd" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 930 250 C 980 248, 1080 252, 1180 248 S 1280 252, 1340 250" stroke="#be2edd" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 960 290 C 1010 288, 1100 292, 1200 288" stroke="#9b1fb8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- line cluster 2: blue (play / horns) -->
    <path d="M 900 360 C 960 358, 1060 362, 1160 358 S 1300 362, 1400 360" stroke="#3b82f6" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 930 400 C 990 398, 1100 402, 1250 398 S 1380 402, 1480 398" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- line cluster 3: amber (beat / dur) -->
    <path d="M 900 470 C 960 468, 1040 472, 1120 470" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 940 510 C 1000 508, 1120 512, 1260 508 S 1420 512, 1520 510" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- line cluster 4: green-ish (mixed code) -->
    <path d="M 900 580 C 970 578, 1080 582, 1220 578 S 1380 582, 1480 580" stroke="#be2edd" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 960 620 C 1020 618, 1140 622, 1300 618" stroke="#3b82f6" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 930 660 C 1000 658, 1150 662, 1350 658 S 1520 662, 1620 660" stroke="#f59e0b" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- line cluster 5: bottom of screen -->
    <path d="M 900 730 C 960 728, 1060 732, 1180 728" stroke="#be2edd" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M 940 770 C 1010 768, 1160 772, 1340 768 S 1500 772, 1600 770" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- parentheses accents — small curved marks suggesting Lisp -->
    <path d="M 880 208 C 872 220, 872 240, 880 252" stroke="#e0e0e0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M 880 358 C 872 370, 872 390, 880 402" stroke="#e0e0e0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M 880 468 C 872 480, 872 500, 880 512" stroke="#e0e0e0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M 1120 212 C 1128 220, 1128 240, 1120 248" stroke="#e0e0e0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M 1400 362 C 1408 370, 1408 390, 1400 398" stroke="#e0e0e0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- floor glow from screen -->
  <g transform="translate(0 900)">
    <rect fill="url(#floorGlow)" width="2844" height="700"/>
  </g>
  <!-- figure — gestural strokes implying a seated presence -->
  <g transform="rotate(-2 1370 800)">
    <!-- shoulder sweep: a single long stroke, left-to-right, slight droop -->
    <path d="M 1120 750 C 1180 710, 1280 690, 1370 695              S 1520 710, 1600 760" stroke="#9b1fb8" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- torso stroke: flows down from shoulder centre -->
    <path d="M 1370 700 C 1365 780, 1355 880, 1340 1000              S 1320 1100, 1300 1150" stroke="#be2edd" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.35"/>
    <!-- second torso line, offset — gives volume without closing the shape -->
    <path d="M 1390 710 C 1400 800, 1410 900, 1420 1010              S 1430 1100, 1440 1140" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.25"/>
    <!-- head: a loose arc floating above the shoulders -->
    <path d="M 1310 680 C 1305 630, 1330 580, 1375 570              S 1440 580, 1445 630" stroke="#9b1fb8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- left arm gesture: reaching forward toward screen -->
    <path d="M 1160 770 C 1180 810, 1220 840, 1280 850" stroke="#be2edd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- right arm gesture -->
    <path d="M 1580 780 C 1560 820, 1510 845, 1450 850" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.25"/>
    <!-- soft glow where screen light pools on the figure -->
    <ellipse cx="1370" cy="780" rx="160" ry="200" fill="#be2edd" opacity="0.035"/>
  </g>
  <!-- audience silhouettes — left side, organic blobs -->
  <g opacity="0.35">
    <!-- cluster of heads/shoulders as abstract forms -->
    <path d="M -80 800 C 0 720, 120 700, 200 740              C 280 780, 320 830, 340 900              S 320 1020, 280 1080              C 240 1140, 160 1160, 80 1140              S -40 1060, -80 1000 Z" fill="#1a1a1a" stroke="#be2edd" stroke-width="1.5" opacity="0.6"/>
    <path d="M 180 720 C 260 660, 380 640, 460 680              C 540 720, 580 790, 580 860              S 560 980, 520 1040              C 480 1100, 400 1120, 320 1100              S 220 1020, 200 940              C 180 860, 180 780, 180 720 Z" fill="#1a1a1a" stroke="#9b1fb8" stroke-width="1" opacity="0.5"/>
    <path d="M 420 680 C 500 640, 600 630, 660 660              C 720 700, 740 760, 740 820              S 720 920, 680 960              C 640 1000, 580 1010, 520 990              S 440 920, 420 860              C 400 800, 400 720, 420 680 Z" fill="#1a1a1a" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <!-- head circles atop audience -->
    <circle cx="130" cy="740" r="35" fill="#1a1a1a" stroke="#be2edd" stroke-width="1" opacity="0.5"/>
    <circle cx="350" cy="680" r="30" fill="#1a1a1a" stroke="#9b1fb8" stroke-width="1" opacity="0.4"/>
    <circle cx="540" cy="660" r="28" fill="#1a1a1a" stroke="#3b82f6" stroke-width="1" opacity="0.35"/>
  </g>
  <!-- light rays from screen — subtle beams fanning out -->
  <g opacity="0.06" fill="none" stroke-linecap="round">
    <path d="M 1380 400 L 200 1400" stroke="#be2edd" stroke-width="60"/>
    <path d="M 1380 400 L 600 1500" stroke="#3b82f6" stroke-width="50"/>
    <path d="M 1380 400 L 2400 1400" stroke="#be2edd" stroke-width="50"/>
    <path d="M 1380 400 L 2700 1300" stroke="#3b82f6" stroke-width="40"/>
  </g>
  <!-- organic forms in lower third — pooled light and drifting shapes -->
  <g transform="rotate(3 1400 1350)">
    <path d="M 600 1200 C 750 1140, 950 1120, 1100 1160              C 1250 1200, 1300 1280, 1220 1340              C 1140 1400, 920 1420, 760 1380              S 500 1280, 600 1200 Z" fill="#be2edd" opacity="0.07"/>
    <path d="M 650 1220 C 780 1170, 940 1155, 1060 1185              C 1180 1215, 1230 1275, 1160 1320              S 900 1370, 780 1340              C 660 1310, 560 1270, 650 1220 Z" fill="#9b1fb8" opacity="0.05"/>
  </g>
  <g transform="rotate(-2 2000 1300)">
    <path d="M 1800 1180 C 1950 1120, 2200 1100, 2400 1150              C 2600 1200, 2700 1300, 2620 1380              C 2540 1460, 2300 1480, 2100 1440              S 1700 1320, 1800 1180 Z" fill="#3b82f6" opacity="0.06"/>
    <path d="M 1900 1220 C 2020 1170, 2220 1160, 2380 1200              C 2540 1240, 2600 1320, 2530 1380              S 2260 1430, 2100 1400              C 1940 1370, 1810 1280, 1900 1220 Z" fill="#3b82f6" opacity="0.04"/>
  </g>
  <g transform="rotate(1 1400 1450)">
    <path d="M 300 1350 C 450 1300, 650 1320, 780 1380              C 910 1440, 880 1520, 740 1550              S 400 1540, 300 1480              C 200 1420, 180 1390, 300 1350 Z" fill="#f59e0b" opacity="0.05"/>
  </g>
  <g>
    <path d="M 1300 1320 C 1420 1280, 1600 1270, 1750 1310              C 1900 1350, 1940 1430, 1850 1490              C 1760 1550, 1550 1560, 1400 1520              S 1200 1400, 1300 1320 Z" fill="#be2edd" opacity="0.05"/>
    <ellipse cx="1580" cy="1420" rx="180" ry="90" fill="#9b1fb8" opacity="0.03" transform="rotate(-5 1580 1420)"/>
  </g>
  <!-- scattered dots in lower third -->
  <g opacity="0.3">
    <circle cx="700" cy="1280" r="5" fill="#be2edd"/>
    <circle cx="1050" cy="1350" r="4" fill="#f59e0b"/>
    <circle cx="1650" cy="1300" r="4.5" fill="#3b82f6"/>
    <circle cx="2200" cy="1350" r="3.5" fill="#be2edd"/>
    <circle cx="450" cy="1420" r="3" fill="#3b82f6" opacity="0.6"/>
    <circle cx="2500" cy="1280" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="1900" cy="1480" r="3" fill="#9b1fb8" opacity="0.4"/>
  </g>
  <!-- floating code particles — small dots drifting from screen -->
  <g opacity="0.4">
    <circle cx="1050" cy="380" r="4" fill="#be2edd"/>
    <circle cx="980" cy="300" r="3" fill="#3b82f6"/>
    <circle cx="1700" cy="350" r="3.5" fill="#f59e0b"/>
    <circle cx="1780" cy="280" r="3" fill="#be2edd"/>
    <circle cx="1100" cy="250" r="2.5" fill="#f59e0b"/>
    <circle cx="1600" cy="200" r="3" fill="#3b82f6"/>
    <circle cx="1250" cy="180" r="2" fill="#be2edd" opacity="0.6"/>
    <circle cx="1500" cy="150" r="2.5" fill="#3b82f6" opacity="0.5"/>
    <circle cx="900" cy="450" r="3" fill="#f59e0b" opacity="0.5"/>
    <circle cx="1800" cy="500" r="4" fill="#be2edd" opacity="0.3"/>
    <circle cx="750" cy="550" r="3" fill="#3b82f6" opacity="0.25"/>
    <circle cx="1950" cy="600" r="3.5" fill="#f59e0b" opacity="0.2"/>
  </g>
</svg>
