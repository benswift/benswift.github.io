<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2844 1600">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b1fb8"/>
      <stop offset="1" stop-color="#be2edd"/>
    </linearGradient>
    <linearGradient id="warmth" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#be2edd"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#9b1fb8"/>
    </linearGradient>
    <linearGradient id="fade-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="haze-left" cx="0.15" cy="0.5" r="0.45">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haze-right" cx="0.8" cy="0.45" r="0.4">
      <stop offset="0" stop-color="#be2edd" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Backdrop -->
  <rect fill="#1a1a1a" width="2844" height="1600"/>
  <rect fill="url(#haze-left)" width="2844" height="1600"/>
  <rect fill="url(#haze-right)" width="2844" height="1600"/>
  <!-- Left: diffuse question-space — loose curving forms like half-formed question marks -->
  <g opacity="0.18">
    <g transform="rotate(-5 300 500)">
      <path d="M 180 280                C 260 180, 420 140, 480 220                S 460 380, 400 440                C 370 480, 350 520, 360 580" fill="none" stroke="#3b82f6" stroke-width="18" stroke-linecap="round"/>
      <circle cx="365" cy="650" r="9" fill="#3b82f6"/>
    </g>
    <g transform="translate(80 200) rotate(3 500 700)">
      <path d="M 50 650                C 130 530, 300 480, 380 560                S 370 720, 310 790                C 280 830, 260 870, 270 940" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round"/>
      <circle cx="275" cy="1000" r="7" fill="#3b82f6"/>
    </g>
    <g transform="translate(-60 -80) rotate(-2 700 400)">
      <path d="M 550 350                C 650 250, 830 220, 890 310                S 860 470, 800 530" fill="none" stroke="#3b82f6" stroke-width="10" stroke-linecap="round"/>
      <circle cx="800" cy="590" r="5" fill="#3b82f6"/>
    </g>
  </g>
  <!-- Left: soft diffuse cloud behind the question marks -->
  <g transform="rotate(-2 400 800)">
    <path d="M -200 700              C 50 400, 350 300, 600 500              S 900 750, 800 1000              C 650 1200, 300 1150, 100 1050              C -100 950, -200 850, -200 700 Z" fill="url(#cool)" opacity="0.15"/>
  </g>
  <!-- Centre: transition zone — forms becoming more structured -->
  <!-- Dissolving curves that straighten as they move right -->
  <g opacity="0.12">
    <path d="M 900 300              C 1000 280, 1100 350, 1200 340              S 1400 300, 1500 310" fill="none" stroke="#be2edd" stroke-width="3" stroke-linecap="round"/>
    <path d="M 850 550              C 950 520, 1080 560, 1200 540              S 1400 510, 1550 520" fill="none" stroke="#be2edd" stroke-width="3" stroke-linecap="round"/>
    <path d="M 920 800              C 1020 770, 1150 810, 1250 790              S 1420 760, 1580 770" fill="none" stroke="#be2edd" stroke-width="3" stroke-linecap="round"/>
    <path d="M 870 1050              C 970 1030, 1100 1060, 1220 1040              S 1400 1010, 1560 1020" fill="none" stroke="#be2edd" stroke-width="3" stroke-linecap="round"/>
    <path d="M 940 1280              C 1040 1260, 1130 1300, 1260 1280              S 1430 1250, 1590 1260" fill="none" stroke="#be2edd" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Mid: rising terrain shape bridging the two halves -->
  <g transform="translate(40 -20) rotate(1.5 1600 1000)">
    <path d="M 800 1700              C 1050 1300, 1400 1100, 1700 1200              S 2100 950, 2400 1050              C 2600 1100, 2900 950, 2900 1700 Z" fill="url(#glow)" opacity="0.2"/>
  </g>
  <!-- Right: the cross-eval matrix — a grid of cells emerging from the composition -->
  <!-- Grid lines (horizontal) — getting more defined rightward -->
  <g stroke="#be2edd" stroke-linecap="round" fill="none">
    <path d="M 1600 180 L 2750 180" stroke-width="1" opacity="0.08"/>
    <path d="M 1620 310 L 2760 310" stroke-width="1" opacity="0.1"/>
    <path d="M 1610 440 L 2770 440" stroke-width="1" opacity="0.12"/>
    <path d="M 1600 570 L 2780 570" stroke-width="1" opacity="0.14"/>
    <path d="M 1590 700 L 2790 700" stroke-width="1" opacity="0.16"/>
    <path d="M 1600 830 L 2800 830" stroke-width="1" opacity="0.18"/>
    <path d="M 1610 960 L 2790 960" stroke-width="1" opacity="0.2"/>
    <path d="M 1600 1090 L 2780 1090" stroke-width="1" opacity="0.2"/>
    <path d="M 1590 1220 L 2770 1220" stroke-width="1" opacity="0.18"/>
    <path d="M 1600 1350 L 2760 1350" stroke-width="1" opacity="0.16"/>
    <path d="M 1610 1480 L 2750 1480" stroke-width="1" opacity="0.12"/>
  </g>
  <!-- Grid lines (vertical) -->
  <g stroke="#be2edd" stroke-linecap="round" fill="none">
    <path d="M 1750 120 L 1750 1540" stroke-width="1" opacity="0.06"/>
    <path d="M 1900 120 L 1900 1540" stroke-width="1" opacity="0.08"/>
    <path d="M 2050 120 L 2050 1540" stroke-width="1" opacity="0.1"/>
    <path d="M 2200 120 L 2200 1540" stroke-width="1" opacity="0.12"/>
    <path d="M 2350 120 L 2350 1540" stroke-width="1" opacity="0.14"/>
    <path d="M 2500 120 L 2500 1540" stroke-width="1" opacity="0.16"/>
    <path d="M 2650 120 L 2650 1540" stroke-width="1" opacity="0.14"/>
  </g>
  <!-- Matrix cells — warm amber dots where pledges are honoured (scattered pattern) -->
  <g fill="#f59e0b">
    <!-- Cluster of "hits" — the interesting agreements -->
    <circle cx="1825" cy="440" r="6" opacity="0.5"/>
    <circle cx="1975" cy="310" r="5" opacity="0.4"/>
    <circle cx="2125" cy="570" r="7" opacity="0.55"/>
    <circle cx="2275" cy="440" r="5" opacity="0.35"/>
    <circle cx="2425" cy="310" r="6" opacity="0.45"/>
    <circle cx="2575" cy="570" r="5" opacity="0.4"/>
    <circle cx="1825" cy="700" r="7" opacity="0.6"/>
    <circle cx="2125" cy="830" r="6" opacity="0.5"/>
    <circle cx="2275" cy="700" r="5" opacity="0.35"/>
    <circle cx="2425" cy="960" r="7" opacity="0.55"/>
    <circle cx="2575" cy="830" r="6" opacity="0.45"/>
    <circle cx="1975" cy="1090" r="5" opacity="0.4"/>
    <circle cx="2275" cy="1090" r="6" opacity="0.5"/>
    <circle cx="2425" cy="1220" r="5" opacity="0.35"/>
    <circle cx="1825" cy="960" r="5" opacity="0.4"/>
    <circle cx="2125" cy="1220" r="7" opacity="0.5"/>
    <circle cx="2575" cy="1090" r="5" opacity="0.35"/>
    <circle cx="1975" cy="830" r="6" opacity="0.45"/>
    <circle cx="2650" cy="700" r="5" opacity="0.3"/>
    <circle cx="2650" cy="960" r="6" opacity="0.4"/>
  </g>
  <!-- A few "broken pledge" marks — purple-blue, the controversial ones -->
  <g fill="#3b82f6">
    <circle cx="1975" cy="570" r="5" opacity="0.35"/>
    <circle cx="2425" cy="700" r="6" opacity="0.4"/>
    <circle cx="2275" cy="960" r="5" opacity="0.3"/>
    <circle cx="1825" cy="1220" r="6" opacity="0.35"/>
    <circle cx="2575" cy="1350" r="5" opacity="0.3"/>
    <circle cx="2125" cy="1350" r="5" opacity="0.25"/>
  </g>
  <!-- One "controversial" cell — larger, glowing, where the crit gets good -->
  <circle cx="2275" cy="700" r="14" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <circle cx="2275" cy="700" r="22" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <!-- Accent: warm shape connecting matrix to the terrain below -->
  <g transform="translate(20 40) rotate(-3 2200 1100)">
    <path d="M 1800 1150              C 2000 1020, 2300 980, 2500 1060              S 2750 920, 2850 960              C 2880 980, 2820 1100, 2640 1150              S 2200 1230, 1800 1150 Z" fill="url(#warmth)" opacity="0.18"/>
  </g>
  <!-- Fine accent strokes — sharpening lines suggesting declarative statements -->
  <path d="M 1550 1400            C 1800 1300, 2100 1250, 2400 1280            S 2700 1200, 2900 1230" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <path d="M 1500 200            C 1700 160, 1950 180, 2200 170            S 2500 140, 2700 155" fill="none" stroke="#e0e0e0" stroke-width="1.5" opacity="0.06" stroke-linecap="round"/>
</svg>
